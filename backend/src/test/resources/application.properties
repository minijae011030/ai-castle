spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:aicastle}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# 테스트에서 보안 필터 체인/빈 초기화는 필요하지만, 외부 의존성(예: DB, OpenAI)을 피한다.
openai.api-key=dummy
openai.model=gpt-4.1-mini
jwt.secret=${JWT_SECRET:}

