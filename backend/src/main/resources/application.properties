spring.application.name=backend

# 404 시 NoHandlerFoundException 던져서 전역에서 ResultResponse로 응답
spring.mvc.throw-exception-if-no-handler-found=true

# MySQL (env 우선, 없으면 기본값 사용)
# MYSQL_HOST, MYSQL_PORT, MYSQL_DATABASE, MYSQL_USERNAME, MYSQL_PASSWORD
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:aicastle}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Seoul
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA: 테이블 자동 생성(개발용), 운영 시 validate 권장
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT (env: JWT_SECRET 32자 이상)
jwt.secret=${JWT_SECRET:}
jwt.access-expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

# refreshToken 쿠키 Secure 플래그 (HTTPS 환경에서는 true로 설정)
app.refresh-cookie-secure=${REFRESH_COOKIE_SECURE:false}

# OpenAI
openai.api-key=${OPENAI_API_KEY:}
# 최종 응답: OPENAI_MODEL 로 고품질 모델 지정 
openai.model=${OPENAI_MODEL:gpt-4o}
# 추론·라우팅 등: 저비용 모델
openai.inference-model=${OPENAI_INFERENCE_MODEL:gpt-4o-mini}
openai.base-url=${OPENAI_BASE_URL:https://api.openai.com}

# Agent Auto Batch Scheduler
app.scheduler.agent-batch.enabled=${AGENT_BATCH_ENABLED:true}
# 0이면 전체 MAIN 에이전트를 사용
app.scheduler.agent-batch.default-main-agent-id=${AGENT_BATCH_MAIN_AGENT_ID:0}
